name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Generate debug keystore
      run: |
        mkdir -p $HOME/.android
        keytool -genkeypair -v -keystore $HOME/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -dname "CN=Android Debug,O=Android,C=US" -keyalg RSA -keysize 2048 -validity 10000

    - name: Bump version
      id: version
      run: |
        # Read current version from build.gradle
        VERSION_NAME=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*versionName "\([^"]*\)".*/\1/')
        VERSION_CODE=$(grep 'versionCode' app/build.gradle | head -1 | sed 's/.*versionCode \([0-9]*\).*/\1/')
        
        # Bump patch version
        MAJOR=$(echo $VERSION_NAME | cut -d. -f1)
        MINOR=$(echo $VERSION_NAME | cut -d. -f2)
        PATCH=$(echo $VERSION_NAME | cut -d. -f3)
        NEW_PATCH=$((PATCH + 1))
        NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
        NEW_VERSION_CODE=$((VERSION_CODE + 1))
        
        # Update build.gradle
        sed -i "s/versionCode [0-9]*/versionCode ${NEW_VERSION_CODE}/" app/build.gradle
        sed -i "s/versionName \"[^\"]*\"/versionName \"${NEW_VERSION}\"/" app/build.gradle
        
        # Export for later steps
        echo "version_name=${NEW_VERSION}" >> $GITHUB_OUTPUT
        echo "version_code=${NEW_VERSION_CODE}" >> $GITHUB_OUTPUT
        
        echo "Version bumped: ${VERSION_NAME} (${VERSION_CODE}) -> ${NEW_VERSION} (${NEW_VERSION_CODE})"

    - name: Build Release APK
      id: build
      continue-on-error: true
      run: |
        ./gradlew assembleRelease --no-daemon --info > build.log 2>&1 || true

    - name: Show build log tail
      run: tail -50 build.log

    - name: Upload build log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log

    - name: Check build result
      run: |
        if [ "${{ steps.build.outcome }}" != "success" ]; then
          echo "Build failed! Check build-log artifact for details."
          exit 1
        fi

    - name: Verify APK
      run: |
        APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
        if [ -z "$APK_PATH" ]; then
          echo "ERROR: No APK found!"
          exit 1
        fi
        ls -la "$APK_PATH"
        APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
        echo "APK found: $APK_PATH, size: $APK_SIZE"

    - name: Commit version bump
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add app/build.gradle
        git commit -m "chore: bump version to ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }}) [skip ci]" || echo "No changes to commit"
        git push

    - name: Create Git Tag
      run: |
        git tag "v${{ steps.version.outputs.version_name }}"
        git push origin "v${{ steps.version.outputs.version_name }}"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.version.outputs.version_name }}"
        name: "DouyinTV v${{ steps.version.outputs.version_name }}"
        body: |
          ## DouyinTV v${{ steps.version.outputs.version_name }}
          
          ### 更新内容
          - 修复验证码滑动问题，支持鼠标事件模拟
          - 修复小米电视等设备闪退问题，增强异常处理
          - 修复菜单键无法使用的问题，扩展按键支持
          - 支持横屏/竖屏自动旋转
          - 优化全屏显示体验
          - 优化WebView配置和内存管理
          
          ### 安装说明
          1. 下载APK文件
          2. 通过U盘安装到电视
          3. 允许安装未知来源应用
          4. 启动应用开始使用
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
        generate_release_notes: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
